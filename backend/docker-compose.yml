# ============================================================
# DocuMind — Full Stack Docker Compose
# ============================================================
# Services:
#   ollama       — local LLM server (chat + embeddings)
#   chromadb     — vector store
#   documind-api — FastAPI backend
#
# Usage:
#   First time:  docker compose up --build
#   After that:  docker compose up
#   Stop:        docker compose down
#   Wipe data:   docker compose down -v
# ============================================================

services:
  # ──────────────────────────────────────────────────────────
  # OLLAMA — Local AI model server
  # Runs entirely on your machine. No data leaves your device.
  # Models are stored in a named volume so they survive restarts
  # and don't need to be re-downloaded.
  # ──────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: documind-ollama
    restart: unless-stopped

    ports:
      - "11434:11434" # Ollama API — accessible at http://localhost:11434

    volumes:
      # Named volume: model weights persist across container restarts.
      # Without this, every `docker compose up` re-downloads gigabytes of models.
      - ollama-data:/root/.ollama

      # Mount the model-pull script so we can auto-download models on first run
      - ./docker/ollama/pull-models.sh:/pull-models.sh

    # ── Resource limits ──────────────────────────────────────
    # Prevent Ollama from consuming ALL your RAM/CPU.
    # Adjust based on your machine:
    #   8GB RAM machine  → set memory limit to 6g
    #   16GB RAM machine → set memory limit to 10g
    deploy:
      resources:
        limits:
          memory: 6g # max RAM Ollama can use
          cpus: "4" # max CPU cores
        reservations:
          memory: 2g # guaranteed minimum RAM

    # ── GPU support (optional) ───────────────────────────────
    # Uncomment if you have an NVIDIA GPU — dramatically faster inference.
    # Requires: NVIDIA Container Toolkit installed on host.
    #   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
    #
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5
    #   start_period: 30s # give Ollama time to start before health checks begin

    networks:
      - documind-net

  # ──────────────────────────────────────────────────────────
  # OLLAMA MODEL PULLER — runs once to download models
  # This is a one-shot service that pulls the required models
  # into the shared ollama-data volume, then exits.
  # It only runs on first start (or when models are missing).
  # ──────────────────────────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: documind-ollama-pull
    restart: "no" # run once and exit — not a persistent service

    volumes:
      - ollama-data:/root/.ollama # same volume as ollama service

    # Wait for Ollama to be healthy, then pull models
    # depends_on:
    #   ollama:
    #     condition: service_healthy

    # Pull both models needed by DocuMind:
    #   llama3.2        → chat model (answering questions)
    #   nomic-embed-text → embedding model (converting text to vectors)
    entrypoint: >
      sh -c "
        echo '=== Pulling chat model: llama3.2 ===' &&
        ollama pull llama3.2 &&
        echo '=== Pulling embedding model: nomic-embed-text ===' &&
        ollama pull nomic-embed-text &&
        echo '=== Models ready ==='
      "

    environment:
      # Point this container's ollama CLI at the ollama service
      - OLLAMA_HOST=http://ollama:11434

    networks:
      - documind-net

  # ──────────────────────────────────────────────────────────
  # CHROMADB — Vector store (persists document embeddings)
  # Running Chroma as a separate service (instead of in-process)
  # means the vector index survives FastAPI restarts and can
  # be accessed by multiple backend instances.
  # ──────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: documind-chromadb
    restart: unless-stopped

    ports:
      - "8001:8000" # Chroma HTTP API — http://localhost:8001

    volumes:
      # Persist the vector index to disk.
      # Without this, all ingested documents are lost on restart.
      - chroma-data:/chroma/chroma

    environment:
      - IS_PERSISTENT=TRUE # enable disk persistence
      - ANONYMIZED_TELEMETRY=FALSE # disable Chroma telemetry

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:8001/api/v2/heartbeat || exit 1",
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - documind-net

  # ──────────────────────────────────────────────────────────
  # DOCUMIND API — FastAPI backend
  # ──────────────────────────────────────────────────────────
  documind-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: documind-api
    restart: unless-stopped

    ports:
      - "8000:8000" # FastAPI — http://localhost:8000
        # API docs at http://localhost:8000/docs
      - "5678:5678" # Debugger (debugpy) — http://localhost:5678

    volumes:
      # Persist uploaded files across restarts
      - ./uploads:/app/uploads

    environment:
      # ── LLM config (Ollama) ──────────────────────────────
      OLLAMA_BASE_URL: http://ollama:11434 # internal Docker network URL
      CHAT_MODEL: llama3.2
      EMBEDDING_MODEL: nomic-embed-text

      # ── ChromaDB (HTTP client mode) ──────────────────────
      # When Chroma runs as a separate service, we use HTTP client mode.
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000

      # ── Paths inside the container ─────────────────────
      # Override config.py default (backend/-relative) with
      # the container mount point so the volume is honoured.
      UPLOAD_DIR: /app/uploads

      # ── App config ───────────────────────────────────────
      APP_ENV: ${APP_ENV:-development} # "development" or "production"
      ALLOWED_ORIGINS: http://localhost:3000

      # ── Optional: LangSmith tracing ──────────────────────
      # Comment out if you don't have a LangSmith account
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: documind

    command: >
      sh -c '
        if [ "$APP_ENV" = "development" ]; then
          uvicorn documind_backend.main:app --host 0.0.0.0 --port 8000 --reload --workers 1 --log-level debug
        else
          uvicorn documind_backend.main:app --host 0.0.0.0 --port 8000 --workers 2 --log-level info
        fi
      '
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully # wait for models to be downloaded

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

    networks:
      - documind-net

# ══════════════════════════════════════════════════════════════
# VOLUMES — named volumes persist data between container restarts
# ══════════════════════════════════════════════════════════════
volumes:
  ollama-data:
    # Stores downloaded model weights (~2-4GB per model).
    # Delete this volume only if you want to re-download models.
    name: documind-ollama-data

  chroma-data:
    # Stores the vector index (your ingested documents as embeddings).
    # Delete this volume only if you want to re-ingest all documents.
    name: documind-chroma-data

# ══════════════════════════════════════════════════════════════
# NETWORKS — isolated bridge network for all DocuMind services
# ══════════════════════════════════════════════════════════════
networks:
  documind-net:
    driver: bridge
    name: documind-network
    # Services on this network can reach each other by service name:
    #   http://ollama:11434
    #   http://chromadb:8000
    # They are NOT accessible from outside Docker except via mapped ports.
